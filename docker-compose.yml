# path: docker-compose.yml
version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-returnhub}
      POSTGRES_USER: ${POSTGRES_USER:-returnhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-returnhub}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-returnhub} -d ${POSTGRES_DB:-returnhub}"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - returnhub_postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  returnhub_postgres_data: