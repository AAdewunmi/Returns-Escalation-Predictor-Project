# path: .github/workflows/ci.yml
name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: returnhub
          POSTGRES_USER: returnhub
          POSTGRES_PASSWORD: returnhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U returnhub -d returnhub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: returnhub
      POSTGRES_USER: returnhub
      POSTGRES_PASSWORD: returnhub
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Lint
        run: ruff check .

      - name: Format check
        run: black --check .

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=85 -q
