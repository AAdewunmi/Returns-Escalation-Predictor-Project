  <text x="86" y="112" fill="#365644" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2.5">WORKFLOW OVERVIEW</text>
  <text x="112" y="245" fill="#F9F8F2" font-family="Arial, sans-serif" font-size="14" font-weight="700">1</text>
  <text x="380" y="245" fill="#394439" font-family="Arial, sans-serif" font-size="14" font-weight="700">2</text>
