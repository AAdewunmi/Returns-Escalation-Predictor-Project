  <text x="930" y="245" fill="#F9F8F2" font-family="Arial, sans-serif" font-size="14" font-weight="700">4</text>
  <text x="86" y="290" fill="#1F2B22" font-family="Arial, sans-serif" font-size="28" font-weight="700">Capture</text>
  <text x="86" y="323" fill="#566159" font-family="Arial, sans-serif" font-size="18">Customer issue, order context,</text>
  <text x="86" y="348" fill="#566159" font-family="Arial, sans-serif" font-size="18">and evidence enter one record.</text>
  <text x="354" y="290" fill="#1F2B22" font-family="Arial, sans-serif" font-size="28" font-weight="700">Review</text>
  <text x="354" y="323" fill="#566159" font-family="Arial, sans-serif" font-size="18">Teams assess the case with</text>
  <text x="354" y="348" fill="#566159" font-family="Arial, sans-serif" font-size="18">history, notes, and attachments.</text>
  <text x="622" y="290" fill="#1F2B22" font-family="Arial, sans-serif" font-size="28" font-weight="700">Route</text>
  <text x="622" y="323" fill="#566159" font-family="Arial, sans-serif" font-size="18">Ownership moves to ops or</text>
  <text x="622" y="348" fill="#566159" font-family="Arial, sans-serif" font-size="18">merchant review with context intact.</text>
  <text x="890" y="290" fill="#F9F8F2" font-family="Arial, sans-serif" font-size="28" font-weight="700">Resolve</text>
  <text x="890" y="323" fill="#D8E8DC" font-family="Arial, sans-serif" font-size="18">Final outcome recorded with</text>
